<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МОДЫ | NOVATORI ESHKERE CRAFT</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        @font-face {
            font-family: 'MinecraftTitleCyrillic';
            src: url('minecraft.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'MinecraftTitleCyrillic', 'Courier New', monospace;
            border-radius: 0 !important;
            image-rendering: pixelated;
        }

        body {
            background-color: #1e1e1e;
            background-image:
                linear-gradient(45deg, rgba(60, 60, 60, 0.15) 2px, transparent 2px),
                linear-gradient(-45deg, rgba(60, 60, 60, 0.15) 2px, transparent 2px),
                linear-gradient(0deg, rgba(40, 40, 40, 0.3) 1px, transparent 1px),
                radial-gradient(circle at 50% 0%, rgba(76, 175, 80, 0.08) 0%, transparent 60%);
            background-size: 32px 32px, 32px 32px, 8px 8px, 100% 100%;
            background-attachment: fixed;
            color: #E0E0E0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            box-shadow: inset 0 0 200px rgba(0, 0, 0, 0.8);
        }

        a, button {
            outline: none;
            text-decoration: none;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translateZ(0);
        }

        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            top: -10px;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle at 30% 30%, #a5d6a7, #2e7d32);
            box-shadow: 0 0 8px #4caf50, 0 0 12px rgba(76, 175, 80, 0.5);
            border-radius: 50% !important;
            opacity: 0;
            animation: floatParticle linear infinite;
            will-change: transform;
        }

        @keyframes floatParticle {
            0% { transform: translateY(-20px) translateX(0px) scale(0.8); opacity: 0; }
            10% { opacity: 0.9; }
            30% { transform: translateY(30vh) translateX(15px) scale(1.2); opacity: 0.8; }
            60% { transform: translateY(65vh) translateX(-20px) scale(0.9); opacity: 0.5; }
            85% { transform: translateY(85vh) translateX(10px) scale(0.7); opacity: 0.2; }
            100% { transform: translateY(105vh) translateX(-5px) scale(0.5); opacity: 0; }
        }

        .header-premium {
            background-color: #2d2d2d;
            background-image:
                repeating-linear-gradient(45deg, rgba(0,0,0,0.25) 2px, transparent 4px),
                repeating-linear-gradient(-45deg, rgba(0,0,0,0.15) 2px, transparent 4px);
            background-size: 12px 12px, 12px 12px;
            border-bottom: 5px solid #4caf50;
            padding: 18px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.7);
            position: relative;
            z-index: 100;
            width: 100%;
        }

        .header-premium::after {
            content: "";
            position: absolute;
            bottom: -7px;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #4caf50, #81c784, #4caf50);
            z-index: 101;
            pointer-events: none;
            box-shadow: 0 0 12px #4caf50;
        }

        .nav-vertical-left { display: flex; flex-direction: column; gap: 20px; }
        .nav-item-wrapper { display: flex; align-items: center; position: relative; height: 72px; }

        .nav-icon-block {
            display: flex; align-items: center; justify-content: center;
            background: #545454; border: 4px solid #000000;
            box-shadow: inset -3px -3px 0 #2a2a2a, inset 3px 3px 0 #7a7a7a;
            width: 72px; height: 72px; padding: 12px; z-index: 3;
            transition: transform 0.2s ease, background 0.2s; cursor: pointer;
            backface-visibility: hidden;
            transform: translateZ(0);
            will-change: transform;
        }

        .nav-icon { width: 40px; height: 40px; flex-shrink: 0; object-fit: contain; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5)); }

        .nav-item-wrapper:not(.active):not(.wrapper-donate):hover .nav-icon-block,
        .nav-item-wrapper:not(.active):not(.wrapper-donate) .nav-icon-block:active {
            transform: scale(1.08);
            background: #6b6b6b;
            box-shadow: inset -2px -2px 0 #2a2a2a, inset 2px 2px 0 #9a9a9a;
        }
        .nav-item-wrapper:not(.active):not(.wrapper-donate):hover .nav-icon,
        .nav-item-wrapper:not(.active):not(.wrapper-donate) .nav-icon-block:active .nav-icon {
            transform: scale(1.05);
        }

        .mc-nav-drawer-btn {
            position: absolute; left: 68px; top: 0; height: 72px; width: 0;
            background: #545454; border: 4px solid #000000;
            box-shadow: inset -3px -3px 0 #2a2a2a, inset 0px 3px 0 #7a7a7a;
            display: flex; align-items: center; overflow: hidden; z-index: 2;
            text-decoration: none; opacity: 0;
            transition: width 0.35s cubic-bezier(0.25, 1, 0.35, 1) 0.08s, opacity 0.25s ease 0.08s;
        }

        .nav-item-wrapper:hover .mc-nav-drawer-btn { width: 210px; opacity: 1; }
        .mc-nav-drawer-btn:hover { background: #6b6b6b; }

        .nav-text { font-size: 20px; color: #fff; position: absolute; left: 22px; white-space: nowrap; letter-spacing: 2px; text-shadow: 2px 2px 0 #000; }

        .nav-item-wrapper.active .nav-icon-block { background: #4caf50; box-shadow: inset -3px -3px 0 #2e7d32, inset 3px 3px 0 #81c784; }
        .nav-item-wrapper.active .mc-nav-drawer-btn { background: #4caf50; box-shadow: inset -3px -3px 0 #2e7d32, inset 0px 3px 0 #81c784; }

        .wrapper-donate .nav-icon-block { background: #2e7d32; box-shadow: inset -3px -3px 0 #1b5e20, inset 3px 3px 0 #66bb6a; }
        .wrapper-donate:hover .nav-icon-block,
        .wrapper-donate .nav-icon-block:active {
            background: #388e3c;
            transform: scale(1.08);
            box-shadow: inset -2px -2px 0 #1b5e20, inset 2px 2px 0 #81c784;
        }
        .btn-donate-drawer {
            background: #2e7d32;
            box-shadow: inset -3px -3px 0 #1b5e20, inset 0px 3px 0 #66bb6a;
            left: 67px;
        }
        .wrapper-donate .mc-nav-drawer-btn:hover,
        .btn-donate-drawer:hover {
            background: #388e3c;
            box-shadow: inset -3px -3px 0 #1b5e20, inset 0px 3px 0 #81c784;
        }
        .wrapper-donate .mc-nav-drawer-btn:active,
        .btn-donate-drawer:active {
            background: #388e3c;
            box-shadow: inset -3px -3px 0 #1b5e20, inset 0px 3px 0 #81c784;
        }

        .server-title-clean {
            font-weight: normal; color: #ffffff; text-transform: uppercase;
            text-shadow: 3px 3px 0 #000000, 0 0 20px rgba(76, 175, 80, 0.7), 0 0 40px rgba(76, 175, 80, 0.3);
            display: flex; flex-direction: column; align-items: center; line-height: 1.1;
        }
        .title-main-row { display: flex; flex-direction: row; gap: 14px; letter-spacing: 4px; align-items: baseline; font-size: 56px; }
        .title-subtitle { font-size: 26px; letter-spacing: 3px; margin-top: 4px; text-shadow: 2px 2px 0 #000, 0 0 10px rgba(76, 175, 80, 0.4); }
        .title-icon { width: 36px; height: 36px; margin-top: 12px; filter: drop-shadow(0 0 12px #4caf50); animation: pickaxeSwing 2.5s ease-in-out infinite; object-fit: contain; }

        @keyframes pickaxeSwing { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(20deg); } 75% { transform: rotate(-15deg); } }

        .mods-container {
            background: #2d2d2d;
            border: 6px solid #000;
            box-shadow: inset -3px -3px 0 #1a1a1a, inset 3px 3px 0 #5a5a5a, 0 20px 40px rgba(0,0,0,0.8);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            margin: 20px;
            z-index: 10;
            text-align: center;
        }

        .mods-title {
            font-size: 32px; color: #fff; text-transform: uppercase;
            text-shadow: 3px 3px 0 #000, 0 0 20px rgba(76, 175, 80, 0.7);
            margin-bottom: 20px; letter-spacing: 2px;
        }

        .mods-description {
            font-size: 16px; color: #a5d6a7; margin-bottom: 30px;
            text-shadow: 1px 1px 0 #000; line-height: 1.5;
        }

        .mods-download-btn {
            background: #2e7d32;
            border: none;
            box-shadow: 
                inset -3px -3px 0 #1b5e20, 
                inset 3px 3px 0 #66bb6a,
                0 0 0 4px #000;
            color: #fff;
            font-size: 22px;
            text-transform: uppercase;
            padding: 15px 30px;
            cursor: pointer;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #000;
            transition: background 0.2s, box-shadow 0.15s ease;
            display: inline-block;
            backface-visibility: hidden;
            transform: translateZ(0);
            will-change: box-shadow;
        }

        .mods-download-btn:hover {
            background: #388e3c;
            box-shadow: 
                inset -2px -2px 0 #1b5e20, 
                inset 2px 2px 0 #81c784,
                0 0 0 4px #000;
        }

        .mods-download-btn:active {
            box-shadow: 
                inset 4px 4px 0 #000, 
                inset -2px -2px 0 #1b5e20,
                0 0 0 4px #000;
            transform: translate(2px, 2px) translateZ(0);
        }

        .back-link {
            color: #a5d6a7; font-size: 18px;
            margin-top: 25px; display: inline-block;
            text-shadow: 1px 1px 0 #000; transition: color 0.15s;
            cursor: pointer;
        }
        .back-link:hover { color: #fff; text-decoration: underline; }

        .mute-widget {
            position: fixed; bottom: 80px; right: 20px; z-index: 9999;
            display: flex; align-items: center; gap: 14px;
            background: #2d2d2d; border: 4px solid #000000;
            box-shadow: inset -3px -3px 0 #1a1a1a, inset 3px 3px 0 #5a5a5a, 3px 3px 0 #000;
            padding: 10px 16px; cursor: pointer; user-select: none;
        }
        .mute-label { font-size: 16px; color: #a5d6a7; text-shadow: 2px 2px 0 #000; letter-spacing: 1px; }
        .mute-toggle-track {
            width: 54px; height: 30px; background: #2e7d32;
            border: 3px solid #000000; box-shadow: inset 2px 2px 0 #1b5e20;
            position: relative; overflow: hidden;
        }
        .mute-thumb {
            width: 26px; height: 28px; background: #9c9c9c;
            box-shadow: inset -2px -2px 0 #565656, inset 2px 2px 0 #e0e0e0;
            position: absolute; top: -2px; left: 0; transform: translateX(22px);
            transition: transform 0.12s ease; z-index: 5;
        }
        .mute-widget.muted .mute-toggle-track { background: #a82626; box-shadow: inset 2px 2px 0 #5e1414; }
        .mute-widget.muted .mute-thumb { transform: translateX(0); }

        @media (max-width: 768px) {
            .header-premium { flex-direction: column; gap: 20px; padding: 20px; align-items: flex-start; }
            .nav-vertical-left { flex-direction: column; gap: 14px; width: 100%; }
            .nav-item-wrapper { height: 60px; }
            .nav-icon-block { width: 60px; height: 60px; padding: 10px; }
            .nav-icon { width: 34px; height: 34px; }
            .mc-nav-drawer-btn { height: 60px; left: 56px; }
            .nav-item-wrapper:hover .mc-nav-drawer-btn { width: 170px; }
            .nav-text { font-size: 18px; left: 16px; }
            .btn-donate-drawer { left: 55px; }
            .server-title-clean { align-self: center; }
            .title-main-row { flex-direction: column; align-items: center; gap: 4px; font-size: 28px; }
            .title-subtitle { font-size: 16px; }
            .title-icon { width: 24px; height: 24px; }
            .mods-title { font-size: 24px; }
            .mods-download-btn { font-size: 18px; padding: 12px 25px; }
            .mute-widget { bottom: 135px; right: 15px; padding: 8px 12px; gap: 10px; }
            .mute-label { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="particles-container" id="particles-container"></div>

    <header class="header-premium">
        <nav class="nav-vertical-left" aria-label="Основная навигация">
            <div class="nav-item-wrapper">
                <div class="nav-icon-block" aria-hidden="true"><img src="map1.png" alt="Главная" class="nav-icon"></div>
                <a href="index.html" class="mc-nav-drawer-btn"><span class="nav-text">ГЛАВНАЯ</span></a>
            </div>
            <div class="nav-item-wrapper">
                <div class="nav-icon-block" aria-hidden="true"><img src="galleryicon.png" alt="Галерея" class="nav-icon"></div>
                <a href="gallery.html" class="mc-nav-drawer-btn"><span class="nav-text">ГАЛЕРЕЯ</span></a>
            </div>
            <div class="nav-item-wrapper wrapper-donate">
                <div class="nav-icon-block" aria-hidden="true"><img src="donate.png" alt="Донат" class="nav-icon"></div>
                <a href="donate.html" class="mc-nav-drawer-btn btn-donate-drawer"><span class="nav-text">ДОНАТ</span></a>
            </div>
            <div class="nav-item-wrapper active">
                <div class="nav-icon-block" aria-hidden="true"><img src="mods.png" alt="Моды" class="nav-icon"></div>
                <a href="mods.html" class="mc-nav-drawer-btn"><span class="nav-text">МОДЫ</span></a>
            </div>
        </nav>
        <h1 class="server-title-clean">
            <div class="title-main-row"><span>NOVATORI</span><span>ESHKERE</span><span>CRAFT</span></div>
            <div class="title-subtitle">MINECRAFT SERVER</div>
            <img src="pickaxe.png" alt="" class="title-icon">
        </h1>
    </header>

    <div class="mods-container">
        <h1 class="mods-title">❖ МОДЫ СЕРВЕРА ❖</h1>
        <p class="mods-description">
            Все необходимые моды упакованы в один удобный архив.<br>
            Скачай, распакуй в папку <strong>.minecraft/mods</strong> и заходи на сервер!
        </p>
        <!-- ЗАМЕНИ ССЫЛКУ НА СВОЮ -->
        <a href="https://github.com/твой-юзер/твой-репо/releases/download/v1.0/mods.zip" 
           id="mods-download-btn" 
           class="mods-download-btn"
           download>
            💾 СКАЧАТЬ ВСЕ МОДЫ 💾
        </a>
        <br>
        <a href="index.html" class="back-link" id="back-btn">← Вернуться на главную</a>
    </div>

    <audio id="sound-click" preload="auto">
        <source src="click.ogg" type="audio/ogg">
        <source src="click.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound-exp" preload="auto">
        <source src="exp.ogg" type="audio/ogg">
        <source src="exp.mp3" type="audio/mpeg">
    </audio>

    <div class="mute-widget" id="mute-widget">
        <span class="mute-label">ЗВУК</span>
        <div class="mute-toggle-track"><div class="mute-thumb"></div></div>
    </div>

    <script>
        (function() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 5 + 5) + 's';
                p.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(p);
            }
        })();

        const soundClick = document.getElementById('sound-click');
        const soundExp = document.getElementById('sound-exp');
        const muteWidget = document.getElementById('mute-widget');

        let muted = localStorage.getItem('muted') === 'true';
        if (muted) muteWidget.classList.add('muted');

        function playSound(audio) {
            if (!audio || muted) return;
            audio.volume = 0.2;
            audio.pause();
            audio.currentTime = 0;
            audio.play().catch(() => {});
        }

        muteWidget.addEventListener('click', () => {
            muted = !muted;
            localStorage.setItem('muted', muted);
            muteWidget.classList.toggle('muted');
            playSound(soundClick);
        });

        document.querySelectorAll('.nav-icon-block').forEach(el => {
            el.addEventListener('click', () => playSound(soundClick));
        });

        document.querySelectorAll('.mc-nav-drawer-btn').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const href = this.getAttribute('href');
                playSound(soundClick);
                setTimeout(() => {
                    if (href) window.location.href = href;
                }, 120);
            });
        });

        document.getElementById('back-btn').addEventListener('click', function(e) {
            e.preventDefault();
            playSound(soundClick);
            setTimeout(() => {
                window.location.href = this.getAttribute('href');
            }, 150);
        });
    </script>
</body>
</html>
